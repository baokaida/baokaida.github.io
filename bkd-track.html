<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="translate" content="no">
<title>BKD 保凯达 | 运单追踪</title>
<style>
:root{--navy:#0f1f3d;--blue:#1a56db;--teal:#0d9488;--bg:#f0f6ff;--text:#1e293b;--muted:#64748b;--bdr:#bfdbfe;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.stripe{height:4px;background:linear-gradient(90deg,var(--blue),var(--teal));}
header{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--teal));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;}
.lt h1{font-size:15px;color:#fff;font-weight:600;}.lt p{font-size:9px;color:#93c5fd;letter-spacing:.06em;}
.nav-link{margin-left:auto;font-size:12px;color:#93c5fd;text-decoration:none;border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:6px 12px;transition:all .2s;white-space:nowrap;}
.nav-link:hover{background:rgba(255,255,255,.1);color:#fff;}
main{display:flex;justify-content:center;padding:28px 12px 60px;}
.wrap{width:100%;max-width:660px;}

/* 搜索卡片 */
.search-card{background:#fff;border-radius:14px;box-shadow:0 4px 30px rgba(15,31,61,.08);overflow:hidden;margin-bottom:18px;}
.sch{background:linear-gradient(135deg,var(--navy),#1e3c72);padding:20px 22px 16px;}
.sch h2{font-size:19px;color:#fff;font-weight:700;}.sch p{font-size:11px;color:#93c5fd;margin-top:3px;}
.sb{padding:18px 22px 20px;}
.input-row{display:flex;gap:10px;}
.input-wrap{flex:1;position:relative;}
.input-wrap input{
  width:100%;padding:11px 36px 11px 14px;border:1.5px solid var(--bdr);border-radius:9px;
  font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);outline:none;
  transition:border-color .15s;letter-spacing:.02em;
}
.input-wrap input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.08);}
.input-wrap input::placeholder{color:#94a3b8;font-size:13px;}
.clear-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:15px;padding:2px 4px;display:none;line-height:1;}
.clear-btn:hover{color:var(--text);}
.btn-track{padding:11px 22px;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity .2s;}
.btn-track:hover{opacity:.88;}
.btn-track:disabled{opacity:.55;cursor:not-allowed;}
.hint-text{margin-top:9px;font-size:10px;color:var(--muted);}
.hlabel{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:14px;margin-bottom:7px;}
.history-bar{display:flex;flex-wrap:wrap;gap:6px;}
.htag{background:var(--bg);border:1px solid var(--bdr);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--blue);cursor:pointer;font-family:monospace;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.htag:hover{background:#dbeafe;border-color:var(--blue);}
.hdel{color:#94a3b8;font-size:10px;}.hdel:hover{color:#ef4444;}

/* 结果卡片 */
.result-card{background:#fff;border-radius:14px;box-shadow:0 4px 30px rgba(15,31,61,.08);overflow:hidden;display:none;}

/* 结果头部 */
.rh{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.carrier-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;background:var(--muted);}
.rh-info{flex:1;}
.rh-name{font-size:13px;font-weight:700;color:var(--navy);}
.rh-num{font-family:monospace;font-size:11px;color:var(--muted);margin-top:1px;}
.state-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.s0{background:#fef9c3;color:#854d0e;}   /* 在途 */
.s1{background:#dbeafe;color:#1e40af;}   /* 已揽件 */
.s3{background:#dcfce7;color:#166534;}   /* 已签收 */
.s5{background:#fef3c7;color:#92400e;}   /* 派件中 */
.s2,.s4,.s6{background:#fee2e2;color:#991b1b;} /* 异常/退签 */
.copy-btn{font-size:11px;color:var(--teal);cursor:pointer;border:1px solid var(--teal);border-radius:5px;padding:4px 10px;background:#fff;font-family:inherit;font-weight:700;transition:all .15s;flex-shrink:0;}
.copy-btn:hover{background:#f0fdfa;}

/* 时间轴 */
.timeline{padding:18px 20px 24px;}
.tl-item{display:flex;gap:14px;position:relative;padding-bottom:16px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:11px;top:26px;bottom:0;width:1.5px;background:var(--bdr);}
.tl-dot{width:24px;height:24px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:2px;}
.tl-dot.latest{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;box-shadow:0 2px 8px rgba(26,86,219,.3);}
.tl-dot.done{background:#f1f5f9;border:2px solid var(--bdr);color:var(--muted);}
.tl-dot.alert{background:#fee2e2;border:2px solid #fca5a5;color:#dc2626;}
.tl-body{flex:1;}
.tl-time{font-size:10px;color:var(--muted);margin-bottom:3px;}
.tl-text{font-size:13px;color:var(--text);line-height:1.5;font-weight:500;}
.tl-text.latest{color:var(--navy);font-weight:700;}
.tl-loc{font-size:10px;color:var(--teal);margin-top:3px;}

/* 加载 */
.loading-wrap{padding:44px;text-align:center;}
.loader{display:inline-block;width:30px;height:30px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-wrap p{font-size:12px;color:var(--muted);margin-top:12px;}

/* 错误 */
.err-wrap{padding:36px;text-align:center;}
.err-wrap .eico{font-size:34px;margin-bottom:10px;}
.err-wrap p{font-size:13px;color:var(--muted);line-height:2;}
.err-wrap a{color:var(--blue);font-weight:700;}

/* Worker未配置提示 */
.setup-banner{background:#fefce8;border:1.5px solid #fde68a;border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:12px;color:#92400e;line-height:1.8;display:none;}
.setup-banner strong{color:#854d0e;}

footer{text-align:center;padding:12px;font-size:10px;color:var(--muted);}
footer a{color:var(--blue);text-decoration:none;}
@media(max-width:500px){.input-row{flex-direction:column;}.btn-track{width:100%;}}
</style>
</head>
<body>
<div class="stripe"></div>
<header>
  <div class="logo">B</div>
  <div class="lt">
    <h1>保凯达（上海）国际物流</h1>
    <p>BKD Cross-Border Logistics · www.baokaida.com</p>
  </div>
  <a class="nav-link" href="bkd-order.html">📦 在线下单</a>
</header>

<main><div class="wrap">

  <div class="search-card">
    <div class="sch">
      <h2>🔍 运单追踪</h2>
      <p>Shipment Tracking · 支持 FedEx / DHL / UPS / CDEK / Aramex 等国际快递</p>
    </div>
    <div class="sb">
      <div class="input-row">
        <div class="input-wrap">
          <input type="text" id="trackInput" placeholder="输入快递单号，例如 773123456789" autocomplete="off" spellcheck="false">
          <button class="clear-btn" id="clearBtn" onclick="clearInput()">✕</button>
        </div>
        <button class="btn-track" id="trackBtn" onclick="doTrack()">查询</button>
      </div>
      <div class="hint-text">💡 下单成功后，BKD 会将快递单号发送至您的邮箱</div>
      <div id="historySection" style="display:none;">
        <div class="hlabel">最近查询</div>
        <div class="history-bar" id="historyBar"></div>
      </div>
    </div>
  </div>

  <div class="result-card" id="resultCard">
    <!-- 加载中 -->
    <div id="loadingWrap" class="loading-wrap">
      <div class="loader"></div>
      <p>正在查询物流信息…</p>
    </div>
    <!-- 时间轴结果 -->
    <div id="tlResult" style="display:none;">
      <div class="rh">
        <div class="carrier-icon" id="carrierIcon">📦</div>
        <div class="rh-info">
          <div class="rh-name" id="carrierName"></div>
          <div class="rh-num" id="carrierNum"></div>
        </div>
        <div class="state-badge" id="stateBadge"></div>
        <button class="copy-btn" id="copyBtn">📋 复制单号</button>
      </div>
      <div class="timeline" id="timeline"></div>
    </div>
    <!-- 错误 -->
    <div id="errWrap" class="err-wrap" style="display:none;">
      <div class="eico">📭</div>
      <p id="errMsg">暂未查到该运单信息<br>请确认单号正确，或联系 BKD 客服核查</p>
    </div>
  </div>

</div></main>
<footer><a href="http://www.baokaida.com">www.baokaida.com</a> &nbsp;·&nbsp; 保凯达（上海）国际物流有限公司 &nbsp;·&nbsp; <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="c8aaa3ac88aaa9a7a3a9a1aca9e6aba7a5">[email&#160;protected]</a></footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// ══════════════════════════════════════
// ⚙️  部署 Worker 后，把下面这个地址替换成你的 Worker URL
//     格式：https://bkd-track.你的账号名.workers.dev
// ══════════════════════════════════════
var WORKER_URL = 'https://bkd-track.bkd-666.workers.dev';

// 状态文字和样式映射
var STATE_MAP = {
  '0': { text: '运输中',  cls: 's0', icon: '🚚' },
  '1': { text: '已揽件',  cls: 's1', icon: '📬' },
  '2': { text: '疑难件',  cls: 's2', icon: '⚠️' },
  '3': { text: '已签收',  cls: 's3', icon: '✅' },
  '4': { text: '已退签',  cls: 's4', icon: '↩️' },
  '5': { text: '派件中',  cls: 's5', icon: '🛵' },
  '6': { text: '退回中',  cls: 's6', icon: '↩️' },
};

var CARRIER_COLORS = {
  dhl:'#D40511', fedex:'#4D148C', ups:'#5C3317',
  cdek:'#00A651', aramex:'#E8562A', shunfeng:'#E31837',
};
var CARRIER_ICONS = {
  dhl:'✈', fedex:'🚀', ups:'🟤', cdek:'🇷🇺', aramex:'🌙', shunfeng:'📮',
};

/* ── 历史记录 ── */
var HKEY='bkd_track_history';
function loadH(){try{return JSON.parse(localStorage.getItem(HKEY)||'[]');}catch(e){return[];}}
function saveH(a){try{localStorage.setItem(HKEY,JSON.stringify(a));}catch(e){}}
function addH(n){var a=loadH().filter(function(x){return x!==n;});a.unshift(n);if(a.length>8)a=a.slice(0,8);saveH(a);renderH();}
function delH(e,n){e.stopPropagation();saveH(loadH().filter(function(x){return x!==n;}));renderH();}
function renderH(){
  var a=loadH(),sec=document.getElementById('historySection'),bar=document.getElementById('historyBar');
  if(!a.length){sec.style.display='none';return;}
  sec.style.display='block';
  bar.innerHTML=a.map(function(n){
    return '<div class="htag" onclick="fillAndTrack(\''+n+'\')">'
      +n+'<span class="hdel" onclick="delH(event,\''+n+'\')"> ✕</span></div>';
  }).join('');
}
function fillAndTrack(n){document.getElementById('trackInput').value=n;syncClear();doTrack();}

/* ── 输入框 ── */
function clearInput(){document.getElementById('trackInput').value='';document.getElementById('clearBtn').style.display='none';document.getElementById('trackInput').focus();}
function syncClear(){document.getElementById('clearBtn').style.display=document.getElementById('trackInput').value?'block':'none';}
document.getElementById('trackInput').addEventListener('input',syncClear);
document.getElementById('trackInput').addEventListener('keydown',function(e){if(e.key==='Enter')doTrack();});

/* ── 查询主流程 ── */
function doTrack(){
  var num=(document.getElementById('trackInput').value||'').trim().replace(/\s+/g,'');
  if(!num){
    var inp=document.getElementById('trackInput');
    inp.style.borderColor='#fca5a5';inp.focus();
    setTimeout(function(){inp.style.borderColor='';},1500);
    return;
  }

  // 检查 Worker 是否已配置
  if(!WORKER_URL || WORKER_URL==='YOUR_WORKER_URL'){
    document.getElementById('setupBanner').style.display='block';
    return;
  }

  addH(num);
  showLoading();

  fetch(WORKER_URL+'/track?num='+encodeURIComponent(num))
    .then(function(r){return r.json();})
    .then(function(d){renderResult(d,num);})
    .catch(function(e){showErr('网络错误，请稍后重试<br><small>'+e.message+'</small>');});
}

function showLoading(){
  var rc=document.getElementById('resultCard');
  rc.style.display='block';
  document.getElementById('loadingWrap').style.display='block';
  document.getElementById('tlResult').style.display='none';
  document.getElementById('errWrap').style.display='none';
  document.getElementById('trackBtn').disabled=true;
  rc.scrollIntoView({behavior:'smooth',block:'start'});
}

function showErr(msg){
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('tlResult').style.display='none';
  document.getElementById('errWrap').style.display='block';
  document.getElementById('errMsg').innerHTML=msg;
  document.getElementById('trackBtn').disabled=false;
}

function renderResult(d,num){
  document.getElementById('trackBtn').disabled=false;
  document.getElementById('loadingWrap').style.display='none';

  if(!d.ok || !d.data || !d.data.length){
    showErr('暂未查到「'+num+'」的物流信息<br>请确认单号正确，或联系 BKD 客服核查<br><br>'
      +'<a href="https://www.kuaidi100.com/chaxun?nu='+encodeURIComponent(num)+'" target="_blank">前往快递100官网查询 →</a>');
    return;
  }

  // 头部信息
  var com=d.com||'';
  var icon=document.getElementById('carrierIcon');
  icon.textContent=CARRIER_ICONS[com]||'📦';
  icon.style.background=CARRIER_COLORS[com]||'var(--muted)';

  document.getElementById('carrierName').textContent=d.comName||(com?com.toUpperCase():'快递公司');
  document.getElementById('carrierNum').textContent=num;

  var st=STATE_MAP[d.state]||STATE_MAP['0'];
  var badge=document.getElementById('stateBadge');
  badge.textContent=st.icon+' '+st.text;
  badge.className='state-badge '+st.cls;

  // 复制按钮
  document.getElementById('copyBtn').onclick=function(){
    navigator.clipboard.writeText(num).then(function(){
      document.getElementById('copyBtn').textContent='✓ 已复制';
      setTimeout(function(){document.getElementById('copyBtn').textContent='📋 复制单号';},2000);
    });
  };

  // 时间轴（快递100返回的 data 数组，最新在前）
  var tl=document.getElementById('timeline');
  tl.innerHTML=d.data.map(function(item,idx){
    var isLatest=(idx===0);
    var isAlert=(item.status==='异常'||item.status==='疑难');
    var dotCls=isLatest?'latest':(isAlert?'alert':'done');
    return '<div class="tl-item">'
      +'<div class="tl-dot '+dotCls+'">'+(isLatest?'●':'○')+'</div>'
      +'<div class="tl-body">'
      +'<div class="tl-time">'+esc(item.ftime||item.time||'')+'</div>'
      +'<div class="tl-text'+(isLatest?' latest':'')+'">'+esc(item.context||item.status||'')+'</div>'
      +(item.location?'<div class="tl-loc">📍 '+esc(item.location)+'</div>':'')
      +'</div></div>';
  }).join('');

  document.getElementById('tlResult').style.display='block';
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* URL参数自动查询 */
(function(){
  var p=new URLSearchParams(window.location.search);
  var n=p.get('nu')||p.get('num')||p.get('track');
  if(n){document.getElementById('trackInput')
